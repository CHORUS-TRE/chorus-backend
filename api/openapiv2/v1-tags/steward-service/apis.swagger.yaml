swagger: "2.0"
info:
  title: chorus steward service
  version: "1.0"
  contact:
    name: chorus steward service
    url: https://github.com/CHORUS-TRE/chorus-backend
    email: dev@chorus-tre.ch
tags:
  - name: StewardService
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
paths:
  /api/rest/v1/steward/tenants/initialize:
    post:
      summary: Initialize a tenant
      description: This endpoint initializes a new tenant
      operationId: StewardService_InitializeTenant
      responses:
        "200":
          description: A successful response.
          schema:
            type: object
            properties: {}
            $ref: '#/definitions/chorusInitializeTenantReply'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/chorusInitializeTenantRequest'
      tags:
        - StewardService
definitions:
  chorusInitializeTenantReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusInitializeTenantResult'
  chorusInitializeTenantRequest:
    type: object
    properties:
      name:
        type: string
  chorusInitializeTenantResult:
    type: object
    properties:
      id:
        type: string
        format: uint64
      name:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  protobufAny:
    type: object
    properties:
      '@type':
        type: string
    additionalProperties: {}
  rpcStatus:
    type: object
    properties:
      code:
        type: integer
        format: int32
      message:
        type: string
      details:
        type: array
        items:
          type: object
          $ref: '#/definitions/protobufAny'
