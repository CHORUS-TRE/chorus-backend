swagger: "2.0"
info:
  title: chorus workspace service
  version: "1.0"
  contact:
    name: chorus workspace service
    url: https://github.com/CHORUS-TRE/chorus-backend
    email: dev@chorus-tre.ch
tags:
  - name: WorkspaceService
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
paths:
  /api/rest/v1/workspaces:
    get:
      summary: List workspaces
      description: This endpoint returns a list of workspaces
      operationId: WorkspaceService_ListWorkspaces
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusListWorkspacesReply'
      parameters:
        - name: pagination.offset
          description: Optionally offset the number of results
          in: query
          required: false
          type: integer
          format: int64
        - name: pagination.limit
          description: Optionally limit the number of results (between 1 and 500)
          in: query
          required: false
          type: integer
          format: int64
        - name: pagination.sort.order
          in: query
          required: false
          type: string
        - name: pagination.sort.type
          in: query
          required: false
          type: string
        - name: pagination.query
          description: Optionally filter the results
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
          x-example:
            - user_id=9999
            - status=STATUS_CREATED,STATUS_CLOSED
        - name: filter.workspaceIdsIn
          in: query
          required: false
          type: array
          items:
            type: string
            format: uint64
          collectionFormat: multi
      tags:
        - WorkspaceService
    post:
      summary: Create a workspace
      description: This endpoint creates a workspace
      operationId: WorkspaceService_CreateWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusCreateWorkspaceReply'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/chorusWorkspace'
      tags:
        - WorkspaceService
    put:
      summary: Update a workspace
      description: This endpoint updates a workspace
      operationId: WorkspaceService_UpdateWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusUpdateWorkspaceReply'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/chorusWorkspace'
      tags:
        - WorkspaceService
  /api/rest/v1/workspaces/public:
    get:
      summary: List public workspaces
      description: This endpoint returns a list of public workspaces
      operationId: WorkspaceService_ListPublicWorkspaces
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusListPublicWorkspacesReply'
      parameters:
        - name: pagination.offset
          description: Optionally offset the number of results
          in: query
          required: false
          type: integer
          format: int64
        - name: pagination.limit
          description: Optionally limit the number of results (between 1 and 500)
          in: query
          required: false
          type: integer
          format: int64
        - name: pagination.sort.order
          in: query
          required: false
          type: string
        - name: pagination.sort.type
          in: query
          required: false
          type: string
        - name: pagination.query
          description: Optionally filter the results
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
          x-example:
            - user_id=9999
            - status=STATUS_CREATED,STATUS_CLOSED
      tags:
        - WorkspaceService
  /api/rest/v1/workspaces/{id}:
    get:
      summary: Get a workspace
      description: This endpoint returns a workspace
      operationId: WorkspaceService_GetWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusGetWorkspaceReply'
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uint64
      tags:
        - WorkspaceService
    delete:
      summary: Delete a workspace
      description: This endpoint deletes a workspace
      operationId: WorkspaceService_DeleteWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusDeleteWorkspaceReply'
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uint64
      tags:
        - WorkspaceService
  /api/rest/v1/workspaces/{id}/user/{userId}:
    delete:
      summary: Remove a user from a workspace
      description: This endpoint removes a user from a workspace
      operationId: WorkspaceService_RemoveUserFromWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusRemoveUserFromWorkspaceReply'
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uint64
        - name: userId
          in: path
          required: true
          type: string
          format: uint64
      tags:
        - WorkspaceService
  /api/rest/v1/workspaces/{id}/user/{userId}/role:
    post:
      summary: Add a user's role in a workspace
      description: This endpoint adds a user's role in a workspace
      operationId: WorkspaceService_AddUserRoleInWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusAddUserRoleInWorkspaceReply'
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uint64
        - name: userId
          in: path
          required: true
          type: string
          format: uint64
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/WorkspaceServiceAddUserRoleInWorkspaceBody'
      tags:
        - WorkspaceService
  /api/rest/v1/workspaces/{id}/user/{userId}/role/{roleName}:
    delete:
      summary: Remove a user's role in a workspace
      description: This endpoint removes a user's role in a workspace
      operationId: WorkspaceService_RemoveUserRoleInWorkspace
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/chorusRemoveUserRoleInWorkspaceReply'
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uint64
        - name: userId
          in: path
          required: true
          type: string
          format: uint64
        - name: roleName
          in: path
          required: true
          type: string
      tags:
        - WorkspaceService
definitions:
  WorkspaceServiceAddUserRoleInWorkspaceBody:
    type: object
    properties:
      role:
        $ref: '#/definitions/chorusRole'
  chorusAddUserRoleInWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusAddUserRoleInWorkspaceResult'
  chorusAddUserRoleInWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusCreateWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusCreateWorkspaceResult'
  chorusCreateWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusDeleteWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusDeleteWorkspaceResult'
  chorusDeleteWorkspaceResult:
    type: object
  chorusGetWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusGetWorkspaceResult'
  chorusGetWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusListPublicWorkspacesReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusListPublicWorkspacesResult'
      pagination:
        $ref: '#/definitions/chorusPaginationResult'
  chorusListPublicWorkspacesResult:
    type: object
    properties:
      publicWorkspaces:
        type: array
        items:
          type: object
          $ref: '#/definitions/chorusPublicWorkspace'
  chorusListWorkspacesReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusListWorkspacesResult'
      pagination:
        $ref: '#/definitions/chorusPaginationResult'
  chorusListWorkspacesResult:
    type: object
    properties:
      workspaces:
        type: array
        items:
          type: object
          $ref: '#/definitions/chorusWorkspace'
  chorusPaginationQuery:
    type: object
    properties:
      offset:
        type: integer
        format: int64
        description: Optionally offset the number of results
      limit:
        type: integer
        format: int64
        description: Optionally limit the number of results (between 1 and 500)
      sort:
        $ref: '#/definitions/chorusSort'
        description: Optionally sort the results
      query:
        type: array
        items:
          type: string
        description: Optionally filter the results
        x-example:
          - user_id=9999
          - status=STATUS_CREATED,STATUS_CLOSED
  chorusPaginationResult:
    type: object
    properties:
      total:
        type: integer
        format: int64
        description: Total number of results
      offset:
        type: integer
        format: int64
        description: Offset used for pagination
      limit:
        type: integer
        format: int64
        description: Limit used for pagination
      sort:
        $ref: '#/definitions/chorusSort'
        description: Sort order used for pagination
  chorusPublicWorkspace:
    type: object
    properties:
      id:
        type: string
        format: uint64
      tenantId:
        type: string
        format: uint64
      name:
        type: string
      shortName:
        type: string
      description:
        type: string
      status:
        $ref: '#/definitions/chorusWorkspaceStatus'
      contactUsername:
        type: string
      contactFirstName:
        type: string
      contactLastName:
        type: string
      contactEmail:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  chorusRemoveUserFromWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusRemoveUserFromWorkspaceResult'
  chorusRemoveUserFromWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusRemoveUserRoleInWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusRemoveUserRoleInWorkspaceResult'
  chorusRemoveUserRoleInWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusRole:
    type: object
    properties:
      id:
        type: string
        format: uint64
      name:
        type: string
      context:
        type: object
        additionalProperties:
          type: string
  chorusSort:
    type: object
    properties:
      order:
        type: string
      type:
        type: string
  chorusUpdateWorkspaceReply:
    type: object
    properties:
      result:
        $ref: '#/definitions/chorusUpdateWorkspaceResult'
  chorusUpdateWorkspaceResult:
    type: object
    properties:
      workspace:
        $ref: '#/definitions/chorusWorkspace'
  chorusWorkspace:
    type: object
    properties:
      id:
        type: string
        format: uint64
      tenantId:
        type: string
        format: uint64
      userId:
        type: string
        format: uint64
      name:
        type: string
      shortName:
        type: string
      description:
        type: string
      status:
        $ref: '#/definitions/chorusWorkspaceStatus'
      isMain:
        type: boolean
      appInstanceIds:
        type: array
        items:
          type: string
          format: uint64
      appInstances:
        type: array
        items:
          type: string
          format: uint64
      namespace:
        type: string
      networkPolicy:
        type: string
      allowedFqdns:
        type: array
        items:
          type: string
      networkPolicyStatus:
        type: string
      networkPolicyMessage:
        type: string
      clipboard:
        type: string
      gid:
        type: string
        format: uint64
      visibility:
        $ref: '#/definitions/chorusWorkspaceVisibility'
      contactUserId:
        type: string
        format: uint64
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  chorusWorkspaceFilter:
    type: object
    properties:
      workspaceIdsIn:
        type: array
        items:
          type: string
          format: uint64
  chorusWorkspaceStatus:
    type: string
    enum:
      - WORKSPACE_STATUS_ACTIVE
      - WORKSPACE_STATUS_INACTIVE
      - WORKSPACE_STATUS_DELETED
    default: WORKSPACE_STATUS_ACTIVE
  chorusWorkspaceVisibility:
    type: string
    enum:
      - WORKSPACE_VISIBILITY_PRIVATE
      - WORKSPACE_VISIBILITY_PUBLIC
    default: WORKSPACE_VISIBILITY_PRIVATE
