syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

message AppInstance {
    uint64 id = 1;

    uint64 tenantId = 2;
    uint64 userId = 3;
    uint64 workspaceId = 4;
    uint64 workbenchId = 5;

    uint64 appId = 6;
    string appName = 7;
    string appDockerImageRegistry = 8;
    string appDockerImageName = 9;
    string appDockerImageTag = 10;

    string status = 11;
    string k8sStatus = 12;
    string k8sMessage = 13;
    string k8sState = 14;

    uint32 initialResolutionWidth = 15;
    uint32 initialResolutionHeight = 16;

    google.protobuf.Timestamp createdAt = 17;
    google.protobuf.Timestamp updatedAt = 18;
}
