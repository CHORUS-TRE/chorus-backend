syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

enum ApprovalRequestType {
    APPROVAL_REQUEST_TYPE_UNSPECIFIED = 0;
    APPROVAL_REQUEST_TYPE_DATA_EXTRACTION = 1;
    APPROVAL_REQUEST_TYPE_DATA_TRANSFER = 2;
}

enum ApprovalRequestStatus {
    APPROVAL_REQUEST_STATUS_UNSPECIFIED = 0;
    APPROVAL_REQUEST_STATUS_PENDING = 1;
    APPROVAL_REQUEST_STATUS_APPROVED = 2;
    APPROVAL_REQUEST_STATUS_REJECTED = 3;
    APPROVAL_REQUEST_STATUS_CANCELLED = 4;
}

message ApprovalRequestFile {
    string sourcePath = 1;
    string destinationPath = 2;
    uint64 size = 3;
}

message DataExtractionDetails {
    uint64 sourceWorkspaceId = 1;
    repeated ApprovalRequestFile files = 2;
}

message DataTransferDetails {
    uint64 sourceWorkspaceId = 1;
    uint64 destinationWorkspaceId = 2;
    repeated ApprovalRequestFile files = 3;
}

// ApproverIds wraps a repeated list of user ids so it can be used as the
// value type of a proto3 map (which does not allow `repeated` values).
message ApproverIds {
    repeated uint64 ids = 1;
}

// ArmApproval records a single per-arm approval decision.
message ArmApproval {
    uint64 approverId = 1;
    google.protobuf.Timestamp approvedAt = 2;
    bool approve = 3;
}

message ApprovalRequest {
    uint64 id = 1;
    uint64 tenantId = 2;
    uint64 requesterId = 3;

    ApprovalRequestType type = 4;
    ApprovalRequestStatus status = 5;
    string title = 6;
    string description = 7;

    oneof details {
        DataExtractionDetails dataExtraction = 8;
        DataTransferDetails dataTransfer = 9;
    }

    // approverIdsByArm lists the user ids allowed to approve each arm of the
    // request, keyed by arm name (e.g. "download", "upload"). A user that
    // appears in every arm can approve the whole request in one step;
    // otherwise each arm must be approved separately.
    map<string, ApproverIds> approverIdsByArm = 10;
    optional uint64 approvedById = 11;

    google.protobuf.Timestamp createdAt = 12;
    google.protobuf.Timestamp updatedAt = 13;
    optional google.protobuf.Timestamp approvedAt = 14;

    bool autoApproved = 15;
    string approvalMessage = 16;

    // armApprovals records the per-arm approval decisions made so far.
    map<string, ArmApproval> armApprovals = 17;
}
