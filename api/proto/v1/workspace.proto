syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

enum WorkspaceVisibility {
    WORKSPACE_VISIBILITY_PRIVATE = 0;
    WORKSPACE_VISIBILITY_PUBLIC = 1;
}

message Workspace {
    uint64 id = 1;

    uint64 tenantId = 2;
    uint64 userId = 3;

    string name = 4;
    string shortName = 5;
    string description = 6;
    string status = 7;
    bool isMain = 8;

    repeated uint64 appInstanceIds = 9;
    repeated uint64 appInstances = 10;
    
    google.protobuf.Timestamp createdAt = 11;
    google.protobuf.Timestamp updatedAt = 12;

    string namespace = 13;

    string networkPolicy = 14;
    repeated string allowedFqdns = 15;
    string networkPolicyStatus = 16;
    string networkPolicyMessage = 17;
    string clipboard = 18;

    uint64 gid = 19;
    optional WorkspaceVisibility visibility = 20;
}

message PublicWorkspace {
    uint64 id = 1;
    uint64 tenant_id = 2;

    string name = 3;
    string description = 4;
    string status = 5;

    optional string contact_username = 6;
    optional string contact_first_name = 7;
    optional string contact_last_name = 8;
    optional string contact_email = 9;

    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
}