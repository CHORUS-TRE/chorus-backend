syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

enum WorkspaceVisibility {
    WORKSPACE_VISIBILITY_PRIVATE = 0;
    WORKSPACE_VISIBILITY_PUBLIC = 1;
}

message Workspace {
    uint64 id = 1;

    uint64 tenant_id = 2;
    uint64 user_id = 3;

    string name = 4;
    string short_name = 5;
    string description = 6;
    string status = 7;
    bool is_main = 8;

    repeated uint64 app_instance_ids = 9;
    repeated uint64 app_instances = 10;
    
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;

    // TODO: check if we want to keep the timestamps last

    string namespace = 13;

    string network_policy = 14;
    repeated string allowed_fqdns = 15;
    string networkPolicy_status = 16;
    string networkPolicy_message = 17;
    string clipboard = 18;

    uint64 gid = 19;
    WorkspaceVisibility visibility = 20;
    uint64 contact_user_id = 21;
}

message PublicWorkspace {
    uint64 id = 1;
    uint64 tenant_id = 2;

    string name = 3;
    string short_name = 4;
    string description = 5;
    string status = 6;

    string contact_username = 7;
    string contact_first_name = 8;
    string contact_last_name = 9;
    string contact_email = 10;

    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
}