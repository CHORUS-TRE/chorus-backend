syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

message AuditEntry {
    uint64 id = 1;

    uint64 actorId = 2;
    string actorUsername = 3;
    string correlationId = 4;

    string action = 5;

    optional uint64 workspaceId = 6;
    optional uint64 workbenchId = 7;
    optional uint64 userId = 8;

    string description = 9;
    map<string, string> details = 10;

    google.protobuf.Timestamp createdAt = 11;
}

message AuditFilter {
    uint64 actorId = 1;
    
    uint64 workspaceId = 2;
    uint64 workbenchId = 3;
    uint64 userId = 4;

    string action = 5;

    google.protobuf.Timestamp fromTime = 6;
    google.protobuf.Timestamp toTime = 7;
}