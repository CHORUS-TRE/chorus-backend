syntax = "proto3";
package chorus;
option go_package = ".;chorus";

import "google/protobuf/timestamp.proto";

message App {
    uint64 id = 1;

    uint64 tenantId = 2;
    uint64 userId = 3;
    
    string name = 4;
    string description = 5;
    string status = 6;
    
    string dockerImageRegistry = 7;
    string dockerImageName = 8;
    string dockerImageTag = 9;

    repeated AppVersion groupedVersions = 10;

    string shmSize = 11;
    string maxCPU = 12;
    string minCPU = 13;
    string maxMemory = 14;
    string minMemory = 15;
    string maxEphemeralStorage = 16;
    string minEphemeralStorage = 17;
    string browserConfigURL = 18;
    string browserConfigJWTURL = 19;
    string browserConfigJWTOIDCClientID = 20;
    string injectOIDCJWTClientID = 21;
    string iconURL = 22;
    string iconBackgroundColor = 23;
    string stabilityStatus = 24;

    google.protobuf.Timestamp createdAt = 25;
    google.protobuf.Timestamp updatedAt = 26;
}

message AppVersion {
    uint64 id = 1;
    string dockerImageTag = 8;
}