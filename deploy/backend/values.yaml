# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

fullnameOverride: ""
nameOverride: ""

image:
  repository: harbor.build.chorus-tre.ch/chorus/backend
  tag: ""
  imagePullPolicy: IfNotPresent

replicaCount: 1

imagePullSecrets:
- name: regcred

# Custom environment variables to be set in the backend container
# env:
#   - name: ENV_VAR_NAME
#     value: "value"
# envFrom:
#   - secretRef:
#       name: my-secret

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

priorityClassName: high-priority
podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: false

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /api/rest/v1/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/rest/v1/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

serviceMonitor:
  enabled: false
  basicAuth:
    enabled: false
    secretName: ""
    usernameKey: "username"
    passwordKey: "password"
  labels:
    app.kubernetes.io/component: metrics

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

clusterRole:
  create: true

# Disable mounting of secrets volume and config override
# all password will need to be set via the config below
# which is not recommended for production use cases
disableMountSecrets: false
# The whole config section is passed to the backend as a config file, so you can override any config value here.
# You can use chorus-backend/configs/chorus-int/values.yaml as a reference for the default values.
config: {}

postgresql:
  enabled: false
  postgresql:
    global:
      postgresql:
        auth:
          postgresPassword: ""
          username: backend
          password: ""
          database: backend
          existingSecret: ""
          secretKeys:
            adminPasswordKey: "postgres-password"
            userPasswordKey: "password"
            replicationPasswordKey: ""
        service:
          port: 5432

    tls:
      enabled: true
      certificatesSecret: backend-db-tls-secret

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false

    primary:
      persistence:
        size: 8Gi
      resourcesPreset: small

    image:
      # https://hub.docker.com/r/bitnamilegacy/postgresql
      registry: docker.io
      repository: bitnamilegacy/postgresql
      tag: 16.4.0

  certificate:
    enabled: true
    secretName: backend-db-tls-secret
    issuerRef:
      name: private-ca-cluster-issuer
      kind: ClusterIssuer
